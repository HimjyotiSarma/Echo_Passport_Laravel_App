services:
  web:
    image: dhi.io/nginx:1.30.0-debian13
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./backend/docker/production/nginx/web.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - frontend
      - backend-web

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - frontend/.env
    # volumes:
    #   - frontend-data:/app
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/status/health').then(res => {if(!res.ok) process.exit(1)}).catch(() => process.exit(1))"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  backend-web:
    # image: dhi.io/nginx:1.30.0-debian13
    build:
      context: backend
      dockerfile: Dockerfile
      target: backend-web
    restart: unless-stopped

    # ports:
    #   - "8000:80"
    # volumes:
    #   - ./docker/production/nginx/backend.conf:/etc/nginx/nginx.conf:ro
    
    networks:
      - backend-net
    depends_on:
      backend:
          condition: service_healthy
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: php-fpm
    env_file:
      - backend/.env
    volumes:
      - storage-data:/var/www/storage
    networks:
      - backend-net
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      # - worker:
      #     condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 3
      start_period: 30s

  database:
    image: mysql:9.7.0
    restart: always
    environment:
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - backend-net
    healthcheck:
      # test: ["CMD-SHELL", "mysql -u ${DB_USERNAME} -p${DB_PASSWORD} -D ${DB_NAME} -e 'SELECT 1' || exit 1"]
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD} || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    
  redis:
    image: redis:8.6.3-alpine
    restart: unless-stopped
    networks:
      - backend-net
    command: redis-server --protected-mode no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - backend/.env
    command: php artisan queue:work
    volumes:
      - storage-data:/var/www/storage
    networks:
      - backend-net
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 5m
      timeout: 30s
      retries: 3
      start_period: 30s

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
volumes:
  db-data:
  redis-data:
  storage-data:

